<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>冷涩调调好像是个乐乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at 50% 0%, #0a1214 0%, #060a0b 50%, #000000 100%);
            color: #6e8a8f;
            line-height: 1.7;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            font-weight: 400;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 70% 20%, rgba(40, 90, 100, 0.03) 0%, transparent 50%),
                        radial-gradient(ellipse at 30% 80%, rgba(30, 70, 80, 0.02) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        .header, .content, .footer {
            position: relative;
            z-index: 1;
        }
        
        .header {
            text-align: center;
            margin-bottom: 35px;
            padding-bottom: 25px;
            border-bottom: 1px solid rgba(50, 100, 110, 0.04);
        }
        
        .avatar-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 15px;
        }
        
        .avatar-wrapper::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2a5a62, #1a3a42, #2a5a62);
            background-size: 300% 300%;
            animation: glowSpin 6s ease-in-out infinite;
            z-index: -1;
            filter: blur(12px);
            opacity: 0.15;
        }
        
        @keyframes glowSpin {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(50, 100, 110, 0.10);
            display: block;
            margin: 0 auto;
            position: relative;
            background: #060a0b;
        }
        
        .name {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #5a8a8f, #3a6a6f, #2a5a5f, #3a6a6f);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 4s ease-in-out infinite;
            letter-spacing: 2px;
            opacity: 0.8;
        }
        
        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .content {
            margin-bottom: 25px;
            padding: 20px 24px;
            background: rgba(30, 70, 80, 0.015);
            border-radius: 16px;
            border: 1px solid rgba(50, 100, 110, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        
        .line {
            margin-bottom: 14px;
            font-size: 0.98rem;
            padding: 4px 0;
            border-bottom: 1px solid rgba(50, 100, 110, 0.015);
            color: #6a868a;
        }
        
        .line::before {
            content: '◆';
            color: rgba(50, 100, 110, 0.10);
            font-size: 0.5rem;
            margin-right: 8px;
        }
        
        .friends-section {
            margin-top: 10px;
            margin-bottom: 10px;
            padding: 16px 20px;
            background: rgba(30, 70, 80, 0.02);
            border-radius: 12px;
            border-left: 2px solid rgba(50, 100, 110, 0.06);
        }
        
        .friends-title {
            font-size: 0.7rem;
            margin-bottom: 8px;
            color: rgba(70, 120, 130, 0.30);
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .friend-list {
            font-size: 1rem;
            line-height: 2.2;
            letter-spacing: 0.5px;
            color: #6a868a;
        }

        .bold-deep {
            font-weight: 700;
            color: #7a969a;
        }

        .friend-list .tag {
            display: inline-block;
            background: rgba(50, 100, 110, 0.03);
            padding: 2px 14px;
            border-radius: 20px;
            margin: 2px 6px 2px 0;
            font-size: 0.9rem;
            border: 1px solid rgba(50, 100, 110, 0.03);
            transition: all 0.2s;
            color: #6a868a;
        }
        
        .friend-list .tag:hover {
            background: rgba(50, 100, 110, 0.05);
            border-color: rgba(50, 100, 110, 0.05);
            transform: translateY(-1px);
            color: #7a969a;
        }

        /* ===== 音乐卡片 ===== */
        .music-card {
            margin: 18px 0 14px 0;
            padding: 16px 20px 18px 20px;
            background: rgba(30, 70, 80, 0.02);
            border-radius: 20px;
            border: 1px solid rgba(50, 100, 110, 0.05);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
        }

        .diary-days-row {
            display: flex;
            align-items: baseline;
            justify-content: flex-end;
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(50, 100, 110, 0.03);
        }

        .diary-days {
            font-size: 0.8rem;
            color: rgba(70, 120, 130, 0.30);
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .diary-days strong {
            color: rgba(70, 120, 130, 0.45);
            font-weight: 500;
        }

        .play-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px 0;
            background: rgba(50, 100, 110, 0.04);
            border: 1px solid rgba(50, 100, 110, 0.06);
            border-radius: 16px;
            color: #6a868a;
            font-size: 1.05rem;
            font-weight: 400;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.25s ease;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
            text-decoration: none;
            gap: 10px;
        }

        .play-btn:hover {
            background: rgba(50, 100, 110, 0.07);
            border-color: rgba(50, 100, 110, 0.10);
            transform: scale(1.01);
            color: #7a969a;
        }

        .play-btn:active {
            transform: scale(0.97);
            background: rgba(50, 100, 110, 0.02);
        }

        .play-btn .icon {
            font-size: 1.2rem;
            line-height: 1;
        }

        .play-btn .label {
            font-weight: 400;
        }

        .play-btn .sub {
            font-size: 0.65rem;
            opacity: 0.20;
            margin-left: 2px;
        }

        @media (max-width: 600px) {
            body {
                padding: 12px;
            }
            .avatar {
                width: 100px;
                height: 100px;
            }
            .name {
                font-size: 1.5rem;
            }
            .content {
                padding: 16px;
            }
            .line {
                font-size: 0.9rem;
            }
            .friend-list .tag {
                font-size: 0.8rem;
                padding: 1px 10px;
            }
            .music-card {
                padding: 14px 14px 16px 14px;
                border-radius: 18px;
            }
            .play-btn {
                padding: 14px 0;
                font-size: 0.95rem;
                border-radius: 14px;
            }
            .diary-days {
                font-size: 0.7rem;
            }
        }

        @media (max-width: 400px) {
            .play-btn {
                padding: 12px 0;
                font-size: 0.88rem;
            }
            .music-card {
                padding: 12px 10px 14px 10px;
            }
        }

        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(50, 100, 110, 0.03);
            font-size: 0.75rem;
            color: rgba(70, 120, 130, 0.10);
            text-align: center;
            font-weight: 300;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="avatar-wrapper">
            <img src="698574f2eee738a2970021e3ea8feca5.jpg" alt="头像" class="avatar" onerror="this.style.display='none'">
        </div>
        <div class="name">=冷涩调/兔子</div>
    </div>
    
    <div class="content">
        <div class="line">只在意 @伊索卡尔 @团羽</div>
        <div class="line">入殓师爱梦 列有认可加我你死妈 被我看到你发相关直接撕</div>
        <div class="line">号脆刚别 触雷v10 且有mha属 介意直删</div>
        <div class="line">恶俗b 朋友圈废话多</div>
        
        <!-- 杯杯部分 -->
        <div class="friends-section">
            <div class="friends-title">盘点那些最爱的杯杯</div>
            <div class="friend-list bold-deep" style="margin-top: 0; margin-bottom: 2px;">
                他说他要当我最牛逼的深交 @乐迪
            </div>
            <div class="friend-list" style="margin-top: 0; margin-bottom: 2px;">
                世一萌的乐乐@<span class="bold-deep">东京</span> @<span class="bold-deep">罪朽</span>
            </div>
            <div class="friend-list" style="margin-top: 0; margin-bottom: 4px;">
                同频的人像礼物 @错别字
            </div>
            <div class="friend-list" style="margin-top: 0;">
                @阿翼 @阮熙 @稚时 @小鱼 @寒生 @懔栀 @良木缘
            </div>
        </div>
        
        <!-- 音乐卡片 -->
        <div class="music-card">
            <div class="diary-days-row">
                <span class="diary-days" id="diaryDaysDisplay">💙 和伊索卡尔已经 <strong>0</strong> 天</span>
            </div>
            <a href="https://music.163.com/#/search/m/?s=%E9%9B%A8%E7%88%B1&type=1" 
               target="_blank" 
               class="play-btn" 
               id="musicPlayBtn">
                <span class="icon">🎧</span>
                <span class="label">点此收听我的日记</span>
                <span class="sub">♫</span>
            </a>
        </div>

        <div class="line">NG 小马宝莉 品客</div>
        <div class="line">加我全补</div>
    </div>
    
    <div class="footer">
        最后更新: 2026年7月2日
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const images = document.querySelectorAll('.avatar');
            images.forEach(img => {
                img.onerror = function() {
                    this.style.display = 'none';
                };
            });

            function updateDiaryDays() {
                const startDate = new Date(2022, 5, 25);
                const today = new Date();
                const start = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate());
                const now = new Date(today.getFullYear(), today.getMonth(), today.getDate());
                
                const diffTime = now.getTime() - start.getTime();
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                
                const displayEl = document.getElementById('diaryDaysDisplay');
                if (displayEl) {
                    const days = diffDays >= 0 ? diffDays : 0;
                    displayEl.innerHTML = `💙 和伊索卡尔已经 <strong>${days}</strong> 天`;
                }
            }

            updateDiaryDays();
        });
    </script>
</body>
</html>
