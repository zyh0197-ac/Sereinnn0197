<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冷涩调调的自介</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at 50% 0%, #0d1a1c 0%, #080e0f 50%, #000000 100%);
            color: #9bb5ba;
            line-height: 1.7;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            font-weight: 400;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 70% 20%, rgba(60, 130, 140, 0.04) 0%, transparent 50%),
                        radial-gradient(ellipse at 30% 80%, rgba(50, 110, 130, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        .header, .content, .footer {
            position: relative;
            z-index: 1;
        }
        
        .header {
            text-align: center;
            margin-bottom: 35px;
            padding-bottom: 25px;
            border-bottom: 1px solid rgba(80, 140, 150, 0.06);
        }
        
        .avatar-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 15px;
        }
        
        .avatar-wrapper::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3a7a82, #2a5a62, #3a7a82);
            background-size: 300% 300%;
            animation: glowSpin 6s ease-in-out infinite;
            z-index: -1;
            filter: blur(12px);
            opacity: 0.25;
        }
        
        @keyframes glowSpin {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(60, 130, 140, 0.15);
            display: block;
            margin: 0 auto;
            position: relative;
            background: #0a1214;
        }
        
        .name {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #7aabaf, #5a8a8f, #4a7a7f, #5a8a8f);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 4s ease-in-out infinite;
            letter-spacing: 2px;
        }
        
        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .content {
            margin-bottom: 25px;
            padding: 20px 24px;
            background: rgba(40, 90, 100, 0.025);
            border-radius: 16px;
            border: 1px solid rgba(60, 130, 140, 0.04);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        
        .line {
            margin-bottom: 14px;
            font-size: 0.98rem;
            padding: 4px 0;
            border-bottom: 1px solid rgba(60, 130, 140, 0.02);
            color: #8aacb0;
        }
        
        .line::before {
            content: '◆';
            color: rgba(60, 130, 140, 0.15);
            font-size: 0.5rem;
            margin-right: 8px;
        }
        
        .friends-section {
            margin-top: 10px;
            margin-bottom: 10px;
            padding: 16px 20px;
            background: rgba(40, 90, 100, 0.03);
            border-radius: 12px;
            border-left: 2px solid rgba(60, 130, 140, 0.1);
        }
        
        .friends-title {
            font-size: 0.7rem;
            margin-bottom: 8px;
            color: rgba(90, 150, 160, 0.4);
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .friend-list {
            font-size: 1rem;
            line-height: 2.2;
            letter-spacing: 0.5px;
            color: #8aacb0;
        }
        
        .friend-list .tag {
            display: inline-block;
            background: rgba(60, 130, 140, 0.04);
            padding: 2px 14px;
            border-radius: 20px;
            margin: 2px 6px 2px 0;
            font-size: 0.9rem;
            border: 1px solid rgba(60, 130, 140, 0.04);
            transition: all 0.2s;
            color: #8aacb0;
        }
        
        .friend-list .tag:hover {
            background: rgba(60, 130, 140, 0.08);
            border-color: rgba(60, 130, 140, 0.08);
            transform: translateY(-1px);
            color: #9bb5ba;
        }
        
        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(60, 130, 140, 0.04);
            font-size: 0.75rem;
            color: rgba(90, 150, 160, 0.15);
            text-align: center;
            font-weight: 300;
            letter-spacing: 2px;
        }
        
        @media (max-width: 600px) {
            body {
                padding: 12px;
            }
            .avatar {
                width: 100px;
                height: 100px;
            }
            .name {
                font-size: 1.5rem;
            }
            .content {
                padding: 16px;
            }
            .line {
                font-size: 0.9rem;
            }
            .friend-list .tag {
                font-size: 0.8rem;
                padding: 1px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="avatar-wrapper">
            <img src="698574f2eee738a2970021e3ea8feca5.jpg" alt="头像" class="avatar" onerror="this.style.display='none'">
        </div>
        <div class="name">=冷涩调/兔子</div>
    </div>
    
    <div class="content">
        <div class="line">只在意 @伊索卡尔 @团羽</div>
        <div class="line">入殓师爱梦 列有认可加我你死妈 被我看到你发相关直接撕</div>
        <div class="line">号脆刚别 触雷v10 且有mha属 介意直删</div>
        <div class="line">恶俗b 朋友圈废话多</div>
        
        <!-- 盘点的杯杯部分：标题不变，内部顺序为：深交行 + 新增行1 + 新增行2 + 杯杯名单 -->
        <div class="friends-section">
            <div class="friends-title">盘点那些最爱的杯杯</div>
            <div class="friend-list" style="margin-top: 0; margin-bottom: 2px;">
                他说他要当我最牛逼的深交 @乐迪
            </div>
            <div class="friend-list" style="margin-top: 0; margin-bottom: 2px;">
                世一萌的乐乐@东京 @罪朽
            </div>
            <!-- 新增行2：这个人是谁呀 可能是我的恩师吧@斩频 -->
            <div class="friend-list" style="margin-top: 0; margin-bottom: 4px;">
                这个人是谁呀 可能是我的恩师吧@斩频
            </div>
            <!-- 杯杯名单（放在新增行2下面） -->
            <div class="friend-list" style="margin-top: 0;">
                @阿翼 @阮熙 @稚时 @小鱼 @寒生 @懔栀 @良木缘
            </div>
        </div>
        
        <div class="line">NG 小马宝莉 品客</div>
        <div class="line">加我全补</div>
    </div>
    
    <div class="footer">
        最后更新: 2026年7月9日
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const images = document.querySelectorAll('.avatar');
            images.forEach(img => {
                img.onerror = function() {
                    this.style.display = 'none';
                };
            });
        });
    </script>
</body>
</html>
