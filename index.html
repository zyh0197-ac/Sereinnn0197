<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>冷涩调老傻坤</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at 50% 0%, #0a1214 0%, #060a0b 50%, #000000 100%);
            color: #7a8f93;
            line-height: 1.7;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            font-weight: 400;
            position: relative;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.008) 1px, transparent 1px),
                radial-gradient(circle at 70% 60%, rgba(255,255,255,0.006) 1px, transparent 1px),
                radial-gradient(circle at 40% 80%, rgba(255,255,255,0.005) 1px, transparent 1px),
                radial-gradient(circle at 90% 20%, rgba(255,255,255,0.007) 1px, transparent 1px);
            background-size: 200px 200px, 150px 150px, 180px 180px, 220px 220px;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 70% 20%, rgba(40, 90, 100, 0.03) 0%, transparent 50%),
                        radial-gradient(ellipse at 30% 80%, rgba(30, 70, 80, 0.02) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        .header, .content, .footer {
            position: relative;
            z-index: 1;
        }
        
        .header {
            text-align: center;
            margin-bottom: 35px;
            padding-bottom: 25px;
            border-bottom: 1px solid rgba(60, 110, 120, 0.08);
        }
        
        .avatar-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 15px;
        }
        
        .avatar-wrapper::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2a5a62, #1a3a42, #2a5a62);
            background-size: 300% 300%;
            animation: glowSpin 6s ease-in-out infinite;
            z-index: -1;
            filter: blur(12px);
            opacity: 0.10;
        }
        
        @keyframes glowSpin {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(60, 110, 120, 0.15);
            display: block;
            margin: 0 auto;
            position: relative;
            background: #060a0b;
        }
        
        .name {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 5px;
            color: #8aa8ac;
            letter-spacing: 6px;
            opacity: 0.85;
        }
        
        .content {
            margin-bottom: 25px;
            padding: 20px 24px;
            background: rgba(30, 70, 80, 0.02);
            border-radius: 16px;
            border: 1px solid rgba(60, 110, 120, 0.06);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        
        .line {
            margin-bottom: 14px;
            font-size: 0.98rem;
            padding: 4px 0;
            border-bottom: 1px solid rgba(60, 110, 120, 0.04);
            color: #7a8f93;
        }
        
        .line::before {
            content: '◆';
            color: rgba(60, 110, 120, 0.15);
            font-size: 0.5rem;
            margin-right: 8px;
        }
        
        .friends-section {
            margin-top: 10px;
            margin-bottom: 10px;
            padding: 16px 20px;
            background: rgba(30, 70, 80, 0.03);
            border-radius: 12px;
            border-left: 2px solid rgba(60, 110, 120, 0.10);
        }
        
        .friends-title {
            font-size: 0.7rem;
            margin-bottom: 8px;
            color: rgba(80, 130, 140, 0.35);
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .friend-list {
            font-size: 1rem;
            line-height: 2.2;
            letter-spacing: 0.5px;
            color: #7a8f93;
        }

        .bold-deep {
            font-weight: 700;
            color: #8aa8ac;
        }

        .friend-list .tag {
            display: inline-block;
            background: rgba(60, 110, 120, 0.05);
            padding: 2px 14px;
            border-radius: 20px;
            margin: 2px 6px 2px 0;
            font-size: 0.9rem;
            border: 1px solid rgba(60, 110, 120, 0.05);
            transition: all 0.2s;
            color: #7a8f93;
        }
        
        .friend-list .tag:hover {
            background: rgba(60, 110, 120, 0.08);
            border-color: rgba(60, 110, 120, 0.08);
            transform: translateY(-1px);
            color: #8aa8ac;
        }

        .diary-days-row {
            display: flex;
            align-items: baseline;
            justify-content: flex-end;
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(60, 110, 120, 0.05);
        }

        .diary-days {
            font-size: 0.8rem;
            color: rgba(80, 130, 140, 0.35);
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .diary-days strong {
            color: rgba(80, 130, 140, 0.50);
            font-weight: 500;
        }

        .game-card {
            margin: 14px 0 6px 0;
            padding: 16px 20px;
            background: rgba(30, 70, 80, 0.03);
            border-radius: 20px;
            border: 1px solid rgba(60, 110, 120, 0.08);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .game-card:hover {
            background: rgba(60, 110, 120, 0.08);
            border-color: rgba(60, 110, 120, 0.12);
            transform: scale(1.01);
        }

        .game-card:active {
            transform: scale(0.97);
            background: rgba(60, 110, 120, 0.04);
        }

        .game-card .icon {
            font-size: 1.3rem;
            margin-right: 6px;
        }

        .game-card .label {
            font-size: 0.95rem;
            color: #7a8f93;
            letter-spacing: 1.5px;
            font-weight: 300;
        }

        .game-card .sub {
            font-size: 0.6rem;
            color: rgba(80, 130, 140, 0.15);
            letter-spacing: 1px;
            margin-top: 4px;
            display: block;
        }

        .toast-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 999;
            display: none;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .toast-overlay.show {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes scaleIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .toast-box {
            background: rgba(10, 18, 20, 0.95);
            border: 1px solid rgba(60, 110, 120, 0.15);
            border-radius: 24px;
            padding: 32px 36px 28px 36px;
            max-width: 340px;
            width: 85%;
            text-align: center;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6);
            animation: scaleIn 0.3s ease;
        }

        .toast-box .emoji {
            font-size: 2.8rem;
            display: block;
            margin-bottom: 12px;
        }

        .toast-box .title {
            font-size: 1.1rem;
            color: #8aa8ac;
            letter-spacing: 1px;
            font-weight: 400;
            margin-bottom: 6px;
        }

        .toast-box .msg {
            font-size: 0.85rem;
            color: rgba(80, 130, 140, 0.4);
            letter-spacing: 0.5px;
            line-height: 1.6;
            margin-bottom: 18px;
        }

        .toast-box .btn-close {
            background: rgba(60, 110, 120, 0.08);
            border: 1px solid rgba(60, 110, 120, 0.10);
            border-radius: 12px;
            padding: 10px 32px;
            color: #7a8f93;
            font-size: 0.9rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 300;
        }

        .toast-box .btn-close:hover {
            background: rgba(60, 110, 120, 0.12);
            border-color: rgba(60, 110, 120, 0.15);
            color: #8aa8ac;
        }

        .visitor-count {
            margin-top: 10px;
            padding: 10px 0 4px 0;
            font-size: 0.65rem;
            color: rgba(80, 130, 140, 0.18);
            text-align: center;
            letter-spacing: 1.5px;
            border-top: 1px solid rgba(60, 110, 120, 0.04);
        }

        @media (max-width: 600px) {
            body {
                padding: 12px;
            }
            .avatar {
                width: 100px;
                height: 100px;
            }
            .name {
                font-size: 1.5rem;
                letter-spacing: 4px;
            }
            .content {
                padding: 16px;
            }
            .line {
                font-size: 0.9rem;
            }
            .friend-list .tag {
                font-size: 0.8rem;
                padding: 1px 10px;
            }
            .diary-days {
                font-size: 0.7rem;
            }
            .game-card .label {
                font-size: 0.85rem;
            }
            .toast-box {
                padding: 28px 24px 24px 24px;
            }
            .toast-box .emoji {
                font-size: 2.4rem;
            }
        }

        @media (max-width: 400px) {
            .name {
                letter-spacing: 3px;
            }
            .game-card {
                padding: 14px 14px;
            }
            .game-card .label {
                font-size: 0.8rem;
            }
        }

        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(60, 110, 120, 0.05);
            font-size: 0.75rem;
            color: rgba(80, 130, 140, 0.12);
            text-align: center;
            font-weight: 300;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="avatar-wrapper">
            <img src="FCB9A83EE73B5F22E6DDE0F1280A06AC.jpg" alt="头像" class="avatar" onerror="this.style.display='none'">
        </div>
        <div class="name">=冷涩调/兔子</div>
    </div>
    
    <div class="content">
        <div class="line">只在意 @伊索卡尔 @团羽</div>
        <div class="line">入殓师爱梦 列有认可加我你死妈 被我看到你发相关直接撕</div>
        <div class="line">号脆刚别 触雷v10 且有mha属 介意直删</div>
        <div class="line">恶俗b 朋友圈废话多</div>
        
        <div class="friends-section">
            <div class="friends-title">你们是我最爱的人</div>
            <div class="friend-list bold-deep" style="margin-top: 0; margin-bottom: 2px;">
                他说他要当我最牛逼的深交 @乐迪
            </div>
            <div class="friend-list" style="margin-top: 0; margin-bottom: 2px;">
                世一萌的乐乐@<span class="bold-deep">东京</span> @<span class="bold-deep">罪朽</span>
            </div>
            <div class="friend-list" style="margin-top: 0; margin-bottom: 4px;">
                同频的人像礼物 @错别字
            </div>
            <div class="friend-list" style="margin-top: 0;">
                @阿翼 @阮熙 @稚时 @小鱼 @寒生 @懔栀 @良木缘
            </div>
        </div>

        <div class="game-card" id="gameCard">
            <div>
                <span class="icon">🌼</span>
                <span class="label">第五人格 · 入殓师</span>
                <span class="sub">点击开启游戏 →</span>
            </div>
        </div>

        <div class="diary-days-row" style="margin-top: 10px; margin-bottom: 4px;">
            <span class="diary-days" id="diaryDaysDisplay">💙 和伊索卡尔已经 <strong>0</strong> 天</span>
        </div>

        <div class="visitor-count" id="visitorDisplay">✦ 已有 3,748 人看过我</div>

        <div class="line" style="margin-top: 14px;">NG 小马宝莉 品客</div>
        <div class="line">加我全补</div>
    </div>
    
    <div class="footer">
        最后更新: 2026年7月2日
    </div>

    <div class="toast-overlay" id="toastOverlay">
        <div class="toast-box">
            <span class="emoji">😿</span>
            <div class="title">omg 跳转失败了呢</div>
            <div class="msg">我的技术还是太差了<br>要不你手动打开第五人格吧</div>
            <button class="btn-close" id="toastCloseBtn">知道了</button>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const images = document.querySelectorAll('.avatar');
            images.forEach(img => {
                img.onerror = function() {
                    this.style.display = 'none';
                };
            });

            function updateDiaryDays() {
                const startDate = new Date(2022, 5, 25);
                const today = new Date();
                const start = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate());
                const now = new Date(today.getFullYear(), today.getMonth(), today.getDate());
                
                const diffTime = now.getTime() - start.getTime();
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                
                const displayEl = document.getElementById('diaryDaysDisplay');
                if (displayEl) {
                    const days = diffDays >= 0 ? diffDays : 0;
                    displayEl.innerHTML = `💙 和伊索卡尔已经 <strong>${days}</strong> 天`;
                }
            }
            updateDiaryDays();

            const visitorEl = document.getElementById('visitorDisplay');
            if (visitorEl) {
                let count = localStorage.getItem('visitorCount');
                if (count === null) {
                    count = 3748;
                } else {
                    count = parseInt(count, 10) + 1;
                }
                localStorage.setItem('visitorCount', count);
                visitorEl.textContent = `✦ 已有 ${count.toLocaleString()} 人看过我`;
            }

            const gameCard = document.getElementById('gameCard');
            const toastOverlay = document.getElementById('toastOverlay');
            const toastCloseBtn = document.getElementById('toastCloseBtn');
            let hasShownToast = false;

            function showToast() {
                if (hasShownToast) return;
                hasShownToast = true;
                toastOverlay.classList.add('show');
            }

            toastCloseBtn.addEventListener('click', function() {
                toastOverlay.classList.remove('show');
                hasShownToast = false;
            });

            toastOverlay.addEventListener('click', function(e) {
                if (e.target === toastOverlay) {
                    toastOverlay.classList.remove('show');
                    hasShownToast = false;
                }
            });

            gameCard.addEventListener('click', function() {
                const iosScheme = 'identityv://';
                const appStoreUrl = 'https://apps.apple.com/cn/app/%E7%AC%AC%E4%BA%94%E4%BA%BA%E6%A0%BC/id1232556921';
                const googlePlayUrl = 'https://play.google.com/store/apps/details?id=com.netease.idv.googleplay';
                const officialSite = 'https://idv.163.com/';

                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
                const isAndroid = /Android/.test(navigator.userAgent);

                const iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                iframe.src = iosScheme;
                document.body.appendChild(iframe);

                let timeoutId = null;
                let isAppOpened = false;

                function onVisibilityChange() {
                    if (document.hidden) {
                        isAppOpened = true;
                        clearTimeout(timeoutId);
                        document.removeEventListener('visibilitychange', onVisibilityChange);
                        if (iframe.parentNode) {
                            document.body.removeChild(iframe);
                        }
                    }
                }

                document.addEventListener('visibilitychange', onVisibilityChange);

                timeoutId = setTimeout(function() {
                    document.removeEventListener('visibilitychange', onVisibilityChange);
                    if (iframe.parentNode) {
                        document.body.removeChild(iframe);
                    }

                    if (!isAppOpened) {
                        showToast();
                        setTimeout(function() {
                            if (isIOS) {
                                window.location.href = appStoreUrl;
                            } else if (isAndroid) {
                                window.location.href = googlePlayUrl;
                            } else {
                                window.location.href = officialSite;
                            }
                        }, 2000);
                    }
                }, 2500);
            });
        });
    </script>
</body>
</html>
